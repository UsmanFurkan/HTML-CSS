<!DOCTYPE html>
<html lang="en">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>HTML Forms</title>
</head>
<body>
          <h1>HTML Forms</h1>
          <form>
                    <label for="username">Enter username: </label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>
                    <br><br>
                    <label for="email">Enter email: </label>
                    <input type="email" id="email" name="email" placeholder="Enter email" required>
                    <br><br>
                    <label for="password">Enter password: </label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                    <p>select age</p>
                    <input type="radio" name="age" value="0-25" id="option-1">
                    <label for="option-1">0-25</label>
                    <input type="radio" name="age" value="26-50" id="option-2">
                    <label for="option-2">26-50</label>
                    <input type="radio" name="age" value="51+" id="option-3">
                    <label for="option-3">51+</label>
                    <br><br>
                    <label for="question">Security question: </label>
                    <select name="question" id="question" required>
                              <option value="q1">What is HTML</option>
                              <option value="q2">What is CSS</option>
                              <option value="q3">What is Javascript</option>
                              <option value="q4">What is C</option>
                              <option value="q5">What is C++</option>
                    </select>
                    <br><br>
                    <label for="answer">Security answer: </label>
                    <input type="text" name="answer" id="answer">
                    <br><br>
                    <label for="bio">Your bio</label>
                    <br>
                    <textarea name="bio" id="bio" cols="30" rows="10" placeholder="about you"></textarea>
                    <br>
                    <input type="submit" value="submit the form">
          </form>
          
</body>
</html>
